services:
  db:
    image: postgres
    container_name: restaurant_management_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_management
    ports:
      - "5432:5432"
    volumes:
      - restaurant_management_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: restaurant_management_app
    ports:
      - "8080:8080"
    environment:
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      - db

volumes:
  restaurant_management_data: